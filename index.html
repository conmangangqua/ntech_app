<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trung tâm cài đặt Ứng dụng Nội Bộ chuẩn Premium" />
  <!-- Chống cache triệt để để luôn tải file JSON mới nhất -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>App Release Hub</title>
  
  <style>
    /* CSS Tối ưu Hóa chuẩn Web UI/UX Pro Max */
    :root {
      --bg-surface: #0f172a; /* Slate 900 */
      --bg-card: rgba(30, 41, 59, 0.7); /* Slate 800 with opacity for glassmorphism */
      --border-card: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc; /* Slate 50 */
      --text-muted: #94a3b8; /* Slate 400 */
      --accent-blue: #3b82f6; /* Blue 500 */
      --accent-blue-hover: #2563eb; /* Blue 600 */
      --accent-green: #10b981;
      --accent-green-hover: #059669;
      --accent-orange: #f59e0b;
      --accent-orange-hover: #d97706;
      --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-stack);
      background-color: var(--bg-surface);
      background-image: radial-gradient(circle at top right, rgba(59, 130, 246, 0.15), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Container khóa cỡ màn hình khổng lồ, giãn ở mobile */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    /* Header chuẩn phân tầng thẻ H1 H2 */
    header {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeInDown 0.6s ease-out;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.025em;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 65ch; /* Giới hạn độ dài dòng đọc */
      margin: 0 auto;
    }

    /* Grid layout auto-fit */
    main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 2rem;
    }

    /* Card thiết kế chuẩn Glassmorphism kiểm soát */
    .app-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.25rem;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
      animation: fadeInUp 0.5s ease-out both;
    }

    .app-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2);
    }

    /* Tạo dải độ lùi cho animation card */
    .app-card:nth-child(1) { animation-delay: 0.1s; }
    .app-card:nth-child(2) { animation-delay: 0.2s; }
    .app-card:nth-child(3) { animation-delay: 0.3s; }
    .app-card:nth-child(4) { animation-delay: 0.4s; }

    .card-header {
      display: flex;
      align-items: flex-start;
      margin-bottom: 1.5rem;
    }

    /* Anti-CLS cho hình ảnh (Cố định khung, tỷ lệ 1/1) */
    .app-icon {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 1.2rem;
      overflow: hidden;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      aspect-ratio: 1/1; 
      display: block;
    }

    .app-title-group {
      margin-left: 1.25rem;
      flex-grow: 1;
    }

    .app-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-main);
      margin-bottom: 0.25rem;
      line-height: 1.2;
    }

    .platform-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.6rem;
      border-radius: 9999px;
    }

    .platform-badge.ios {
      background-color: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }

    .platform-badge.android {
      background-color: rgba(16, 185, 129, 0.2);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    .app-desc {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      flex-grow: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .feature-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }

    .feature-tag {
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      padding: 0.3rem 0.75rem;
      border-radius: 9999px;
    }

    /* Các Nút Bấm chuẩn Priority 1 */
    .card-actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: auto;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px; /* Tối thiểu chạm cho ngón tay Mobile */
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
      outline: none;
    }
    
    /* Hỗ trợ bàn phím Focus - Tiêu chuẩn Phản bồi số 1 */
    .btn:focus-visible {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.5);
    }

    .btn:active {
      transform: scale(0.97); /* Micro-interaction độ nén nút */
    }

    .btn-dev {
      background-color: var(--accent-blue);
    }
    .btn-dev:hover {
      background-color: var(--accent-blue-hover);
    }
    .btn-prod {
      background-color: var(--accent-green);
    }
    .btn-prod:hover {
      background-color: var(--accent-green-hover);
    }
    .btn-aab {
      background-color: var(--accent-orange);
    }
    .btn-aab:hover {
      background-color: var(--accent-orange-hover);
    }

    /* Skeleton Placeholder hoặc Báo Lỗi */
    .system-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      background: var(--bg-card);
      border-radius: 1.25rem;
      border: 1px dashed rgba(255,255,255,0.2);
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>📱 Cổng Cài Đặt Ứng Dụng</h1>
      <p>Lựa chọn phiên bản Test (Dev) hoặc Hoàn thiện (Live) tương ứng với nền tảng thiết bị di động của bạn.</p>
    </header>

    <main id="appContainer">
      <!-- Dữ liệu JS sẽ đổ bộ vào đây -->
    </main>
  </div>

  <script>
    // Logic Javascript không đổi
    fetch("apps.json")
      .then(res => res.json())
      .then(data => {
        const container = document.getElementById("appContainer");
        
        if (!data.apps || data.apps.length === 0) {
          container.innerHTML = '<div class="system-msg">Chưa có ứng dụng nào được xuất bản. Vui lòng quay lại sau!</div>';
          return;
        }

        data.apps.forEach((app, index) => {
          const isIOS = (app.platform || "").toLowerCase().includes("ios");
          const iconSrc = app.icon || "";
          
          const devUrl = app.downloads?.dev || "";
          const prodUrl = app.downloads?.prod || "";
          
          /* Logic Định Tuyến cho IOS bắt buộc Mã Hoá URL an toàn */
          const formatUrl = (url, isIOS) => {
            if (!url) return "";
            if (isIOS) return "itms-services://?action=download-manifest&url=" + encodeURIComponent(url);
            return url;
          };

          const features = (app.features || [])
            .map(f => `<span class="feature-tag">${f}</span>`)
            .join("");

          const html = `
            <article class="app-card">
              <div class="card-header">
                <div class="app-icon">
                  ${iconSrc ? `<img src="${iconSrc}" alt="Icon ${app.name}" width="80" height="80" onerror="this.style.display='none'">` : '<div style="width:100%;height:100%;background:linear-gradient(135deg,#1e293b,#0f172a);"></div>'}
                </div>
                <div class="app-title-group">
                  <h2 class="app-title">${app.name || "App Name"}</h2>
                  <span class="platform-badge ${isIOS ? 'ios' : 'android'}">OS: ${app.platform || "Android"}</span>
                </div>
              </div>
              
              <p class="app-desc">${app.description || "Chưa có mô tả"}</p>
              
              ${features ? `<div class="feature-group">${features}</div>` : ""}
              
              <div class="card-actions">
                ${devUrl ? `<a class="btn btn-dev" href="${formatUrl(devUrl, isIOS)}" aria-label="Cài đặt bản Dev của ${app.name}">🛠 Cài bản Dev</a>` : ""}
                ${prodUrl ? `<a class="btn btn-prod" href="${formatUrl(prodUrl, isIOS)}" aria-label="Cài đặt bản Live của ${app.name}">🚀 Cài bản Live</a>` : ""}
                ${app.downloads?.aab ? `<a class="btn btn-aab" href="${app.downloads.aab}">📦 Tải file AAB</a>` : ""}
              </div>
            </article>
          `;
          container.insertAdjacentHTML("beforeend", html);
        });
      })
      .catch(err => {
        document.getElementById("appContainer").innerHTML = '<div class="system-msg" style="color:var(--accent-orange)"><b>❌ Lỗi Hệ Thống:</b> Không thể tải danh sách ứng dụng. Vui lòng F5 (tải lại trang).</div>';
        console.error("Lỗi Fetch JSON:", err);
      });
  </script>
</body>
</html>
